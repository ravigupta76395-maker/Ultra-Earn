<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Earn Ultra - Feed • Earn • Withdraw</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    min-height: 100vh;
    background: linear-gradient(135deg, #0a0a1a 0%, #0d1b2a 50%, #0a1628 100%);
    font-family: 'Segoe UI', sans-serif;
    display: flex; align-items: center; justify-content: center;
    color: #fff;
  }
  .container { text-align: center; padding: 40px 20px; }
  .logo {
    width: 100px; height: 100px; border-radius: 50%;
    background: radial-gradient(circle, #00e5ff22, #00e5ff44);
    border: 2px solid #00e5ff66;
    display: flex; align-items: center; justify-content: center;
    margin: 0 auto 24px;
    animation: pulse 2s infinite;
    font-size: 48px;
  }
  @keyframes pulse {
    0%,100% { box-shadow: 0 0 0 0 #00e5ff33; }
    50% { box-shadow: 0 0 0 20px #00e5ff00; }
  }
  h1 { font-size: 2.5rem; font-weight: 800; }
  h1 span { color: #00e5ff; }
  p { color: #8899aa; margin: 12px 0 32px; font-size: 1.1rem; letter-spacing: 2px; text-transform: uppercase; }
  .btn {
    display: inline-block; padding: 16px 40px;
    background: linear-gradient(135deg, #00e5ff, #0070ff);
    color: #000; font-weight: 700; font-size: 1.1rem;
    border-radius: 50px; text-decoration: none;
    transition: transform 0.2s, box-shadow 0.2s;
  }
  .btn:hover { transform: translateY(-2px); box-shadow: 0 8px 30px #00e5ff44; }
</style>
</head>
<body>
<div class="container">
  <div class="logo">🐚</div>
  <h1>Earn<span>Ultra</span></h1>
  <p>Feed • Earn • Withdraw</p>
  <a href="https://t.me/EarnUltraMiniBot" class="btn">🚀 Start Earning</a>
</div>
</body>
</html>
